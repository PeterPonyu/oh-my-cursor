name: Verify Cursor Backbone

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify-backbone:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/cursor-backbone-site/pnpm-lock.yaml

      - name: Install site dependencies
        working-directory: apps/cursor-backbone-site
        run: pnpm install --frozen-lockfile

      - name: Verify site workspace
        working-directory: apps/cursor-backbone-site
        run: pnpm test

      - name: Build static export
        working-directory: apps/cursor-backbone-site
        run: pnpm build

      - name: Verify backbone contract
        run: bash scripts/verify-backbone.sh

      - name: Validate surface visibility
        run: bash scripts/validate-surface-visibility.sh
